  <rect width="495" height="195" rx="12" fill="#0d1117" />
  <rect x="1" y="1" width="493" height="193" rx="11" fill="none" stroke="#30363d" />
  <text x="24" y="54" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    GitHub Stats
  </text>
  <text x="24" y="94" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="16">
